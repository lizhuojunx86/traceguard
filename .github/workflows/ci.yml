name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (incl. mcp extra)
        run: uv sync --python 3.12 --extra mcp

      - name: Run tests
        run: |
          set +e
          uv run pytest -q
          code=$?
          if [ $code -eq 5 ]; then
            echo "::warning::No tests collected — acceptable during stability baseline"
            exit 0
          fi
          exit $code

      - name: Ruff lint
        continue-on-error: true
        run: uv run ruff check .

      - name: Ruff format check
        continue-on-error: true
        run: uv run ruff format --check .

  # The traceguard SDK lives in packages/traceguard with its own uv project, so
  # the root job above never ran its suite. Run it here.
  traceguard-sdk:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packages/traceguard
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install the traceguard SDK
        run: uv sync --python 3.12

      - name: Run SDK tests
        run: uv run pytest -q

      # Blocking (no continue-on-error): the SDK is lint-clean and stays that way.
      - name: Ruff lint
        run: uv run ruff check .

      # Informational: the tree is not ruff-format-clean (52 files would change);
      # enforcing format is a separate, deliberate reformat, not this gate.
      - name: Ruff format check
        continue-on-error: true
        run: uv run ruff format --check .

  # Freeze guard: the tests that mechanically enforce the 1.0 contract — the
  # frozen public surface (__all__, 28 symbols), the normalizer golden hashes,
  # and the four look-ahead invariants. Fast and zero-tolerance; intended to be a
  # REQUIRED status check on main so the freeze is enforced by mechanism, not
  # convention. A change that needs to touch these must do so deliberately (and,
  # for __all__ / golden, accept it is a major break).
  contract-guard:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packages/traceguard
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install the traceguard SDK
        run: uv sync --python 3.12

      - name: Enforce the frozen contract (public surface + golden hashes + invariants)
        run: >
          uv run pytest -q
          tests/test_public_api_surface.py
          tests/test_normalizer_golden.py
          tests/test_validators_lookahead.py
          tests/test_validators_replay_lock.py

  # Real open-weight backend: install the contamination-hf extra (CPU torch) and
  # run the RUN_HF-gated tests for real, so MIN-K% / Min-K%++ on a tiny model is
  # actually exercised instead of perpetually skipped. Separate job so a slow or
  # flaky heavy-dep install never masks the fast SDK signal above.
  traceguard-contamination-hf:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packages/traceguard
    env:
      UV_TORCH_BACKEND: cpu  # CPU-only torch wheels — far smaller, no CUDA libs
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install the SDK with the contamination-hf extra
        run: uv sync --python 3.12 --extra contamination-hf

      - name: Run the HF / Min-K%++ contamination lane (real tiny-gpt2)
        env:
          TRACEGUARD_RUN_HF_TESTS: "1"
        run: uv run pytest -q tests/test_contamination_logprobs.py
