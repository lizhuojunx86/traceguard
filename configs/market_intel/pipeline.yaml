pipeline:
  name: "market-intelligence"
  description: "CIMC 中集运载科技 市场情报多智能体pipeline (4步)"
  trigger: "cron"  # 每日自动执行

  steps:
    # ────────────────────────────────────────────────────────
    # 步骤1: 市场动态收集 (market_01 — 20:00 Asia/Shanghai)
    # ────────────────────────────────────────────────────────
    - name: "step_01_collect"
      container: "market_01:latest"
      input_source: "trigger"

      guardian:
        structural:
          required_fields: ["data", "timestamp", "source"]
          max_length: 80000
          min_length: 500
          language: "zh"

        semantic:
          enabled: true
          model: "MiniMax-M2.7"
          api_base: "https://api.minimaxi.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "输出包含至少8条行业新闻，每条有来源URL"
            - "新闻内容与包装/物流/供应链行业相关"
            - "包含今日或昨日的最新资讯（非旧闻）"
            - "每条新闻有清晰的摘要和行业分类"
          min_score: 3

        actions:
          on_structural_fail: "retry"
          on_semantic_low: "alert"
          max_retries: 2
          retry_hint: >
            确保输出包含至少8条带有来源URL的行业新闻。
            若浏览器/LinkedIn不可用，使用Web Search补充。
            检查news目录路径：/data/shared/raw_data/news/YYYY-MM-DD.md
          alert_channel: "telegram"

    # ────────────────────────────────────────────────────────
    # 步骤2: 数据分析 & 线索挖掘 (market_02 — 20:30 Asia/Shanghai)
    # ────────────────────────────────────────────────────────
    - name: "step_02_analyze"
      container: "market_02:latest"
      input_source: "step_01_collect"

      guardian:
        structural:
          required_fields: ["analysis", "timestamp", "input_step"]
          max_length: 150000
          min_length: 1000
          language: "zh"

        semantic:
          enabled: true
          model: "MiniMax-M2.7"
          api_base: "https://api.minimaxi.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "输出包含market分析文件（analysis/market_YYYY-MM-DD.md）"
            - "输出包含leads线索文件（leads/leads_YYYY-MM-DD.md）"
            - "线索条数不少于8条，每条有可行性评级"
            - "重复率不高于40%"
          min_score: 3

        actions:
          on_structural_fail: "retry"
          on_semantic_low: "alert"
          max_retries: 2
          retry_hint: >
            必须生成两个文件：
            1. /data/shared/analysis/market_YYYY-MM-DD.md
            2. /data/shared/leads/leads_YYYY-MM-DD.md（≥8条线索）
            若LinkedIn不可用，使用存量数据+Web Search补全。
          alert_channel: "telegram"

    # ────────────────────────────────────────────────────────
    # 步骤3: 市场动态报告 (market_03 — 07:00 Asia/Shanghai)
    # ────────────────────────────────────────────────────────
    - name: "step_03_market_report"
      container: "market_03:latest"
      input_source: "step_02_analyze"

      guardian:
        structural:
          schema: "configs/market_intel/schemas/step_03_output.json"
          required_fields: ["report_date", "markdown_path", "pdf_path", "telegram_sent"]
          max_length: 50000
          min_length: 3000
          language: "zh"

        semantic:
          enabled: true
          model: "MiniMax-M2.7"
          api_base: "https://api.minimaxi.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "报告包含摘要、行业趋势、客户需求、竞争格局四个章节"
            - "每条数据有至少1个来源URL（非404）"
            - "报告内容为今日新增信息，未重复昨日主题"
            - "PDF文件已成功生成（>50KB）"
            - "已发送Telegram到6160978961"
          min_score: 3

        actions:
          on_structural_fail: "retry"
          on_semantic_low: "alert"
          max_retries: 2
          retry_hint: >
            报告必须包含四个章节且每条数据有可访问来源。
            确认PDF生成成功且大小>50KB。
            若Telegram发送失败，改发Markdown文本内容（禁止只发占位符）。
          alert_channel: "telegram"

    # ────────────────────────────────────────────────────────
    # 步骤4: 销售线索报告 (market_04 — 21:00 Asia/Shanghai)
    # ────────────────────────────────────────────────────────
    - name: "step_04_leads_report"
      container: "market_04:latest"
      input_source: "step_02_analyze"

      guardian:
        structural:
          schema: "configs/market_intel/schemas/step_04_output.json"
          required_fields: ["report_date", "markdown_path", "lead_count", "telegram_sent"]
          max_length: 80000
          min_length: 2000
          language: "zh"

        semantic:
          enabled: true
          model: "MiniMax-M2.7"
          api_base: "https://api.minimaxi.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "报告包含至少12条销售线索"
            - "每条线索有完整的12个字段（包括可行性评级）"
            - "估算字段有来源或计算依据"
            - "重复率不高于40%"
            - "使用了当日动态日期（非硬编码）"
          min_score: 3

        actions:
          on_structural_fail: "retry"
          on_semantic_low: "alert"
          max_retries: 2
          retry_hint: >
            若外部工具不可用，读取/data/shared/leads/最近7天存量文件补全至12条。
            使用Asia/Shanghai今日动态日期，禁止硬编码2026-03-XX。
            若Telegram失败，发送Markdown完整内容。
          alert_channel: "telegram"
