pipeline:
  name: "quant-research-lab"
  description: "Quant Research Lab — 三阶段论文到策略流水线 (01扫描 → 02/03审核 → 04生成Prompt)"
  trigger: "manual"

  steps:

    # ────────────────────────────────────────────────────────────────
    # Step 01: 文献扫描员输出 — 论文入队 JSON
    # 验证 01 写入 queue/ 的每条论文元数据质量
    # ────────────────────────────────────────────────────────────────
    - name: "step_01_lit_queue"
      container: "qr_lit_01"
      input_source: "trigger"
      description: "文献扫描员写入 queue/ 的论文 JSON 元数据"

      guardian:
        structural:
          schema: "configs/quant_research/schemas/queue_entry.json"
          required_fields: ["paper_id", "title", "status"]
          min_length: 150
          max_length: 20000

        semantic:
          enabled: true
          model: "gpt-4o-mini"
          api_base: "https://api.openai.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "The paper title and abstract are related to quantitative trading, factor investing, portfolio optimization, or financial markets — not purely theoretical math, medical, or unrelated ML topics"
            - "The abstract contains enough information to judge the paper's relevance to trading strategies"
          min_score: 2

        actions:
          on_structural_fail: "abort"
          on_semantic_low: "alert"
          max_retries: 1
          retry_hint: "Queue entry must have paper_id, title, status=pending_review, and a meaningful abstract about quantitative finance."
          alert_channel: "telegram"

    # ────────────────────────────────────────────────────────────────
    # Step 02: 量化审核员输出 — 审核报告 Markdown
    # 验证 02/03 生成的 _review.md 质量
    # ────────────────────────────────────────────────────────────────
    - name: "step_02_review_report"
      container: "qr_review_02"
      input_source: "step_01_lit_queue"
      description: "量化审核员生成的八维评分报告 (Markdown)"

      guardian:
        structural:
          min_length: 1800
          max_length: 15000
          language: "zh"

        semantic:
          enabled: true
          model: "gpt-4o-mini"
          api_base: "https://api.openai.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "The report contains the watermark comment <!-- qr-reviewed-by-utils-v2 --> at the top"
            - "The report contains all 8 scoring dimensions: 可操作性, 实证严谨性, 历史表现, 稳健性, 数据可得性, 实现复杂度, 过拟合风险, 新颖性"
            - "Each dimension includes a numeric score AND specific evidence cited from the paper (not generic placeholders)"
            - "The report includes a final summary table (综合评分) and a concrete action recommendation"
          min_score: 3

        actions:
          on_structural_fail: "retry"
          on_semantic_low: "alert"
          max_retries: 2
          retry_hint: |
            Review report must:
            1. Start with <!-- qr-reviewed-by-utils-v2 --> watermark
            2. Be at least 1800 characters (show detailed evidence)
            3. Contain all 8 dimensions with scores AND evidence from the paper
            4. Include a 综合评分 summary table
            5. Write in Chinese
          alert_channel: "telegram"

    # ────────────────────────────────────────────────────────────────
    # Step 04: 提示工程师输出 — 回测 Prompt Markdown
    # 验证 04 生成的 prompt_*.md 质量
    # ────────────────────────────────────────────────────────────────
    - name: "step_04_prompt_output"
      container: "qr_prompt_04"
      input_source: "step_02_review_report"
      description: "提示工程师生成的 Claude Code 回测 Prompt (Markdown)"

      guardian:
        structural:
          min_length: 3000
          max_length: 30000

        semantic:
          enabled: true
          model: "gpt-4o-mini"
          api_base: "https://api.openai.com/v1"
          api_key_env: "GUARDIAN_LLM_API_KEY"
          criteria:
            - "The prompt clearly describes the core trading signal construction method with specific formulas or algorithms"
            - "The prompt includes a data requirements table with field names, sources (FMP/WRDS), and frequencies"
            - "The prompt includes a Python code framework (backtest function skeleton) with TODO annotations"
            - "All FMP API calls use the /stable/ endpoint format (not /api/v3/)"
          min_score: 3

        actions:
          on_structural_fail: "abort"
          on_semantic_low: "alert"
          max_retries: 1
          retry_hint: |
            Prompt must include:
            1. Signal construction formula/algorithm (specific, not vague)
            2. Data requirements table with FMP /stable/ endpoint paths
            3. Python backtest code framework with TODO markers
            4. All FMP calls must use /stable/ not /api/v3/
          alert_channel: "telegram"
