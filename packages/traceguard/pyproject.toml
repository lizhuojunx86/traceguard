[project]
name = "traceguard"
version = "0.6.0"
description = "Point-in-time correct LLM instrumentation: tracing, version pinning, and look-ahead-bias protection for research pipelines"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Li Zhuojun" }]
keywords = [
    "llm",
    "observability",
    "tracing",
    "backtesting",
    "look-ahead-bias",
    "reproducibility",
    "prompt-versioning",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Quality Assurance",
    "Operating System :: OS Independent",
]
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40.0"]
otel = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    # OTLP/HTTP transport used by the exporter docstring example; without it the
    # `opentelemetry.exporter.otlp...` import in that example would fail.
    "opentelemetry-exporter-otlp-proto-http>=1.20",
]
# Dependency-isolation point for heavier contamination implementations
# (retrieval / LLM-backed claim verification). The shipped estimators
# (min_k_prob, performance_decay_across_regimes, regime_decay_test/_trend, the
# claim-verification reference) are pure standard-library, so this extra still
# adds no runtime deps.
contamination = []
# Reference logprob backend for MIN-K% PROB on open-weight models
# (HFLogprobBackend). Heavy (torch/transformers) and isolated here so neither
# the core package nor the `contamination` extra ever pulls them in.
contamination-hf = [
    "torch>=2.0",
    "transformers>=4.40",
]

[project.urls]
Homepage = "https://github.com/lizhuojunx86/traceguard"
Repository = "https://github.com/lizhuojunx86/traceguard"
Documentation = "https://github.com/lizhuojunx86/traceguard/blob/main/docs/SPEC.md"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/traceguard"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6.0,<0.8.0",
    "opentelemetry-sdk>=1.20",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100
